spring.application.name=DarkBlueHotel


server.port=${PORT:4040}
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
aws.region=${AWS_REGION}


aws.s3.secret.key=${AWS_SECRET_KEY}
aws.s3.access.key=${AWS_ACCESS_KEY}


#iLXUfpJymcZ8vQLnZI7MTHrkCu8LjUo28UB0td6r
bucketname:${AWS_BUCKET_NAME}



#THE MAXIMUM SIGN OF IMAGE THAT CAN BE UPLOADED
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB